name: Qualidade

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m ruff check start_app.py src tests scripts
      - run: python -m ruff format --check start_app.py src tests scripts
      - run: python -m coverage run -m unittest discover -s tests -v
        env:
          PYTHONPATH: src
      - run: python -m coverage report

  electron:
    name: Electron
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: npm ci --prefix electron
      - run: npm --prefix electron run check

  audit:
    name: Dependências
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - run: python -m pip install pip-audit==2.10.1
      - run: python -m pip_audit -r requirements.txt
      - run: npm audit --prefix electron --audit-level=moderate
